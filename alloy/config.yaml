name: Grafana Alloy
version: "1.3.0"
slug: alloy
description: >-
  Ship Home Assistant logs to Loki using Grafana Alloy.
  Replacement for the deprecated Promtail add-on.
  Reads systemd journal and forwards to a remote Loki instance.
url: https://github.com/jsmith432/ha-addon-alloy
arch:
  - aarch64
  - amd64
init: false
startup: services
journald: true
ingress: true
ingress_port: 12345
ingress_stream: true
panel_icon: "mdi:chart-timeline-variant"
options:
  loki_url: null
  advanced_auth: false
  log_level: info
  journal_priority_as_level: true
  parse_ha_log_level: false
  parse_app_log_level: true
  strip_ansi_colors: true
  journal_max_age: 7h
schema:
  loki_url: url
  advanced_auth: bool
  auth_type: "list(basic|bearer)?"
  auth_username: "str?"
  auth_password: "password?"
  bearer_token: "password?"
  tenant_id: "str?"
  tls_ca_pem: "str?"
  log_level: "list(debug|info|warn|error)"
  journal_priority_as_level: "bool?"
  parse_ha_log_level: "bool?"
  parse_python_log_containers: "str?"
  parse_app_log_level: "bool?"
  strip_ansi_colors: "bool?"
  journal_max_age: "str?"
  additional_config: "str?"
