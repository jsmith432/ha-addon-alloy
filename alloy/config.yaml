name: Grafana Alloy
version: "1.1.1"
slug: alloy
description: >-
  Ship Home Assistant logs to Loki using Grafana Alloy.
  Replacement for the deprecated Promtail add-on.
  Reads systemd journal and forwards to a remote Loki instance.
url: https://github.com/jsmith432/ha-addon-alloy
codeowners:
  - "@jsmith432"
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
journald: true
map:
  - addon_config:rw
ports:
  12345/tcp: 12345
ports_description:
  12345/tcp: "Alloy debug UI"
watchdog: "http://[HOST]:[PORT:12345]/-/ready"
options:
  loki_url: "http://localhost:3100/loki/api/v1/push"
  log_level: info
  journal_priority_as_level: true
  parse_ha_log_level: false
schema:
  loki_url: url
  log_level: "list(debug|info|warn|error)"
  journal_priority_as_level: "bool?"
  parse_ha_log_level: "bool?"
  additional_config: "str?"
stage: experimental
apparmor: false
